<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szczep Harcerski "Skrzydło"</title>
    <link rel="stylesheet" href="style.css">
    <link rel ="shortcut icon" href="images/icon.jpg" type="image/x-icon">
    <script type="module" src="fiszki.js" defer></script>
</head>
<body>
    <div id="add-button">
        <a href="index.html"><button class="back-css"></button></a>
        <a href="fiszki_dodaj.html"><button class="plus-css"></button></a>
        
    </div><br>
    <div id="logo">
        <img src="images/skrzydlo_logo_biale.png" width="100" height="100" alt="Logo Szczepu Harcerskiego Skrzydło">
    </div>
    <div class="fiszka-main">
        <input type="checkbox" id="fiszka-toggle" class="fiszka-toggle" hidden>
        <label for="fiszka-toggle" class="fiszka">
            <div class="fiszka-side fiszka-side-a" id="a">
                <span class="fiszka-label"></span>
                <p id="pytanie_fiszka">Pytanie</p>
            </div>
            <div class="fiszka-side fiszka-side-b" id="b">
                <span class="fiszka-label"></span>
                <p id="odpowiedz_fiszka">ODPOWIEDŹ</p>
            </div>
        </label>
    </div>
    <div class="controls-row">
        <button class="control-btn" onclick=odejmij()>&#10094;</button>
        <a href = "techniki.html"><button class="action-btn settings-btn">⚙</button></a>
        <button class="control-btn" onclick=dodaj()>&#10095;</button>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ustawienia quizu - Szczep Harcerski "Skrzydło"</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="images/icon.jpg" type="image/x-icon">
    <script type="module" src="quiz_settings.js" defer></script>
</head>
<body>
    <div id="add-button">
        <button class="back-css" id="backBtn"></button>
    </div><br>
    <div id="logo">
        <img src="images/skrzydlo_logo_biale.png" width="100" height="100" alt="Logo Szczepu Harcerskiego Skrzydło">
    </div>
    
    <div class="quiz-settings">
        <h2>Ustawienia quizu</h2>
        <p id="maxQuestions">Maksymalna liczba pytań: Ładowanie...</p>
        <div class="question-count">
            <label for="questionCount">Liczba pytań:</label>
            <input type="number" id="questionCount" min="1" value="10">
        </div>
        <button id="StartQuiz">Rozpocznij quiz</button>
    </div>

</body>
</html>

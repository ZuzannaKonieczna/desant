<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wybierz techniki do quizu - Szczep Harcerski "Skrzydło"</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="images/icon.jpg" type="image/x-icon">
</head>
<body>
    <div id="add-button">
        <button class="back-css" id="backBtn"></button>
    </div><br>
    <div id="logo">
        <img src="images/skrzydlo_logo_biale.png" width="100" height="100" alt="Logo Szczepu Harcerskiego Skrzydło">
    </div>
    
    <div class="techniki">
        <h2>Wybierz techniki do quizu:</h2>
        <label><input type="checkbox" value="1"> Wiedza o Szczepie</label><br>
        <label><input type="checkbox" value="2"> Historia</label><br>
        <label><input type="checkbox" value="3"> Pionierka</label><br>
        <label><input type="checkbox" value="4"> Terenoznawstwo</label><br>
        <label><input type="checkbox" value="5"> Samarytanka</label><br>
        <label><input type="checkbox" value="6"> PiPH</label><br>
        <label><input type="checkbox" value="7"> Inne Organizacje</label><br>
        <label><input type="checkbox" value="8"> Major Ponury</label><br>
        <label><input type="checkbox" value="9"> 1SBS</label><br>
        <label><input type="checkbox" value="10"> Cichociemni</label><br>
        <label><input type="checkbox" value="11"> Ciotki</label><br>
        <label><input type="checkbox" value="12"> Struktura</label><br>
        <label><input type="checkbox" value="13"> Symbolika</label><br>
        <label><input type="checkbox" value="14"> Szyfry</label><br>
        
        <button id="Potwierdz">Dalej</button>
    

    <script>
        // Funkcja do zapisania wybranych technik
        function saveTechniques() {
            // Zbierz zaznaczone techniki
            const checkboxes = document.querySelectorAll('.techniki input[type="checkbox"]');
            const selectedTechniques = [];
            
            checkboxes.forEach(checkbox => {
                if (checkbox.checked) {
                    selectedTechniques.push(checkbox.value);
                }
            });
            
            // Zapisz w localStorage
            localStorage.setItem('selectedQuizTechniques', JSON.stringify(selectedTechniques));
            
            // Przejdź do ustawień quizu
            window.location.href = 'quiz_settings.html';
        }

        // Funkcja resetowania
    

        // Przycisk "Dalej"
        document.getElementById('Potwierdz').addEventListener('click', function() {
            saveTechniques();
        });
        
        // Przycisk "Resetuj"
        

        // Przycisk wstecz
        const backBtn = document.getElementById('backBtn');
        if (backBtn) {
            backBtn.addEventListener('click', function() {
                window.location.href = 'index.html';
            });
        }
    </script>
</body>
</html>
